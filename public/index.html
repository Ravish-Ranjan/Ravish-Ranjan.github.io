<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Ravish Ranjan's website/portfolio">
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json">
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap");
    </style>
    <title>Portfolio | Ravish-Ranjan</title>
    <style>
      #blob {
        position: absolute;
        top: 0;
        left: 0;
        width: 200px;
        aspect-ratio: 1/1;
        background-color: white;
        z-index: 0;
        border-radius: 6rem;
        animation: rot 10s linear infinite;
        background-image: linear-gradient(to right, aquamarine, purple);
        filter: blur(100px);
      }
      #root {
        z-index: 0;
      }
      @keyframes rot {
        from {
          transform: rotate(0deg) scaleX(1) scaleY(1.3);
        }
        50% {
          transform: rotate(180deg) scaleX(1.3) scaleY(1);
        }
        to {
          transform: rotate(360deg) scaleX(1) scaleY(1.3);
        }
      }
    </style>
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-icon-180.png">
    <link rel="shortcut icon" href="%PUBLIC_URL%/logo.png" type="image/x-icon">
    <meta name="mobile-web-app-capable" content="yes">
  </head>
  <body>
    <div id="blob"></div>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((registration) => {
              console.log(
                "ServiceWorker registration successful with scope: ",
                registration.scope
              );
            })
            .catch((error) => {
              console.log(
                "ServiceWorker registration failed: ",
                error
              );
            });
        });
      }
    </script>
    <script>
      const blob = document.getElementById("blob");
      function setMouse(x, y) {
        blob.style.top = `${y - 100}px`;
        blob.style.left = `${x - 100}px`;
      }
      document.addEventListener("mousemove", (e) => {
        let x = e.clientX + window.pageXOffset;
        let y = e.clientY + window.pageYOffset;
        setMouse(x, y);
      });
    </script>
  </body>
</html>
